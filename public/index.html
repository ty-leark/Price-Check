<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PriceCheck</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">PRICECHECK</div>
      <h1>Know what products should cost.</h1>
      <p>Search across Walmart, Amazon, Target, Costco, Home Depot, and eBay.</p>

      <form id="searchForm" class="search-form">
        <input id="productInput" type="text" placeholder="Search for any product..." />
        <button type="submit">Search</button>
      </form>

      <div id="status" class="status"></div>
      <div id="result" class="result"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
